services:
  mysql:
    image: mysql:8.0
    restart: unless-stopped
    ports:
      - "${MYSQL_PORT:-3308}:3306"
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-root}
      MYSQL_ROOT_HOST: "%"
    command:
      - --default-authentication-plugin=mysql_native_password
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
    volumes:
      - mysql_data:/var/lib/mysql
      - "./Banco DDL.sql:/docker-entrypoint-initdb.d/01-medialist.sql:ro"
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -uroot -p$$MYSQL_ROOT_PASSWORD --silent"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 25s

  mongodb:
    image: mongo:latest
    restart: unless-stopped
    ports:
      - "${MONGO_PORT:-27017}:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_INITDB_ROOT_USERNAME:-admin}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_INITDB_ROOT_PASSWORD:-senha123}
    volumes:
      - mongodb_data:/data/db

  mongo-express:
    image: mongo-express:latest
    restart: unless-stopped
    profiles: ["dev"]
    ports:
      - "${MONGO_EXPRESS_PORT:-8081}:8081"
    environment:
      ME_CONFIG_MONGODB_ADMINUSERNAME: ${MONGO_INITDB_ROOT_USERNAME:-admin}
      ME_CONFIG_MONGODB_ADMINPASSWORD: ${MONGO_INITDB_ROOT_PASSWORD:-senha123}
      ME_CONFIG_MONGODB_URL: mongodb://${MONGO_INITDB_ROOT_USERNAME:-admin}:${MONGO_INITDB_ROOT_PASSWORD:-senha123}@mongodb:27017/
      ME_CONFIG_BASICAUTH: "false"
    depends_on:
      - mongodb

  backend:
    build:
      context: ./Backend
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      APP_HOST: 0.0.0.0
      APP_PORT: 5000
      APP_DEBUG: "false"
      DB_HOST: mysql
      DB_PORT: 3306
      DB_NAME: ${DB_NAME:-medialist_db}
      DB_USER: ${DB_USER:-media_app_user}
      DB_PASSWORD: ${DB_PASSWORD:-MediaList@2025!Secure}
      MONGO_URI: mongodb://${MONGO_INITDB_ROOT_USERNAME:-admin}:${MONGO_INITDB_ROOT_PASSWORD:-senha123}@mongodb:27017/
      MONGO_DB_NAME: ${MONGO_DB_NAME:-medialist_updates_db}
      JWT_SECRET_KEY: ${JWT_SECRET_KEY:-sua-chave-secreta-super-segura}
      JWT_ACCESS_TOKEN_DAYS: ${JWT_ACCESS_TOKEN_DAYS:-1}
      RAWG_API_KEY: ${RAWG_API_KEY:-}
      MB_USER_AGENT: ${MB_USER_AGENT:-MediaListApp/1.0 (dev@exemplo.com)}
      ANILIST_API_URL: ${ANILIST_API_URL:-https://graphql.anilist.co}
      RAWG_API_URL: ${RAWG_API_URL:-https://api.rawg.io/api}
      MB_API_URL: ${MB_API_URL:-https://musicbrainz.org/ws/2}
      CAA_API_URL: ${CAA_API_URL:-https://coverartarchive.org}
    ports:
      - "${BACKEND_PORT:-5000}:5000"
    volumes:
      - "./Backend/importacao_logs:/app/importacao_logs"
    depends_on:
      mysql:
        condition: service_healthy
      mongodb:
        condition: service_started
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:5000/api/health', timeout=5)\""]
      interval: 20s
      timeout: 5s
      retries: 5
      start_period: 20s

  frontend:
    build:
      context: ./Frontend
      dockerfile: Dockerfile
      args:
        REACT_APP_API_URL: ${REACT_APP_API_URL:-/api}
    restart: unless-stopped
    ports:
      - "${FRONTEND_PORT:-3005}:80"
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O /dev/null http://127.0.0.1/ || exit 1"]
      interval: 20s
      timeout: 5s
      retries: 5
      start_period: 10s

volumes:
  mysql_data:
  mongodb_data:
